services:

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  vllm:
    # NOTE: vllm/vllm-openai:latest is built with the most recent CUDA version.
    # If you hit "Error 804: forward compatibility was attempted on non supported HW",
    # your NVIDIA driver is behind the CUDA version bundled in the image.
    # Check available tags at https://hub.docker.com/r/vllm/vllm-openai/tags
    # and pin to one matching your driver (e.g. v0.18.1-cu129 requires driver >= 575).
    # Run `nvidia-smi` to check your CUDA version before pulling.
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model ${VLLM_HF_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
      --served-model-name ${VLLM_MODEL:-qwen3.5-9b-awq}
      --quantization ${VLLM_QUANTIZATION:-awq_marlin}
      --enable-lora
      --max-lora-rank ${VLLM_MAX_LORA_RANK:-64}
      --lora-modules ${VLLM_CYPHER_MODEL:-qwen3.5-9b-nl2cypher-lora}=${VLLM_LORA_REPO:-danp27/qwen3.5-9b-nl2cypher-lora}
      --enable-auto-tool-choice
      --tool-call-parser ${VLLM_TOOL_CALL_PARSER:-qwen3_coder}
      --reasoning-parser ${VLLM_REASONING_PARSER:-qwen3}
      --gpu-memory-utilization 0.90
      --max-num-seqs 3
      --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      neo4j:
        condition: service_healthy
      vllm:
        condition: service_healthy
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL=qwen3.5-9b-awq
      - VLLM_AGENT_MODEL=${VLLM_AGENT_MODEL:-qwen3.5-9b-awq}
      - VLLM_CYPHER_MODEL=${VLLM_CYPHER_MODEL:-qwen3.5-9b-nl2cypher-lora}
    volumes:
      - ./Data:/app/Data

volumes:
  neo4j_data:
