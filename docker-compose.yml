services:

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - VLLM_BASE_URL=http://host.docker.internal:8000/v1
      - VLLM_MODEL=qwen3.5-9b-awq
      - VLLM_AGENT_MODEL=${VLLM_AGENT_MODEL:-qwen3.5-9b-awq}
      - VLLM_CYPHER_MODEL=${VLLM_CYPHER_MODEL:-qwen3.5-9b-nl2cypher-lora}
    volumes:
      - ./Data:/app/Data

volumes:
  neo4j_data:
